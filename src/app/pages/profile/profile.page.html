<ion-header [translucent]="true" class="km-header">
  <ion-toolbar class="km-toolbar">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>

    <ion-title class="km-title">My account</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="km-content">
  <div class="km-wrapper">

    <!-- LOADING -->
    <div class="km-center" *ngIf="loading">
      <ion-spinner name="crescent"></ion-spinner>
      <div class="km-muted">Loading profile…</div>
    </div>

    <!-- ERROR (chargement) -->
    <div class="km-card" *ngIf="!loading && errorMessage && !me">
      <ion-text color="danger">
        <p class="km-error">{{ errorMessage }}</p>
      </ion-text>

      <ion-button expand="block" color="danger" (click)="loadMe()">
        Retry
      </ion-button>

      <ion-button expand="block" fill="outline" color="danger" (click)="logout()">
        Log out
      </ion-button>
    </div>

    <!-- FORM -->
    <div class="km-card" *ngIf="!loading && me">

      <!-- messages -->
      <ion-text color="danger" *ngIf="errorMessage">
        <p class="km-error">{{ errorMessage }}</p>
      </ion-text>

      <ion-text color="success" *ngIf="successMessage">
        <p class="km-success">{{ successMessage }}</p>
      </ion-text>

      <ion-list lines="inset" class="km-form">
        <ion-item>
          <ion-label position="stacked">Prénom</ion-label>
          <ion-input
            [(ngModel)]="firstname"
            name="firstname"
            autocomplete="given-name"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="stacked">Nom</ion-label>
          <ion-input
            [(ngModel)]="lastname"
            name="lastname"
            autocomplete="family-name"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="stacked">Email</ion-label>
          <ion-input
            [(ngModel)]="email"
            name="email"
            type="email"
            autocomplete="email"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="stacked">Date de naissance</ion-label>
          <ion-input
            [(ngModel)]="birthday"
            name="birthday"
            placeholder="YYYY-MM-DD"
          ></ion-input>
        </ion-item>

        <ion-item lines="none">
          <ion-label>
            <div class="km-label">UUID</div>
            <div class="km-value km-mono">{{ me.uuid }}</div>
          </ion-label>
        </ion-item>

        <ion-item lines="none">
          <ion-label>
            <div class="km-label">Nom d’utilisateur</div>
            <div class="km-value">{{ me.username }}</div>
          </ion-label>
        </ion-item>
      </ion-list>

      <div class="km-actions">
        <ion-button expand="block" color="danger" [disabled]="saving" (click)="save()">
          <ion-spinner *ngIf="saving" slot="start" name="crescent"></ion-spinner>
          Enregistrer
        </ion-button>

        <ion-button expand="block" fill="outline" color="danger" (click)="logout()">
          Déconnexion
        </ion-button>
      </div>

    </div>

  </div>
</ion-content>
